name: 🐳 Publish Home Connector

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-home-connector
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    name: ✅ Test Home Connector
    timeout-minutes: 4
    steps:
      - name: ⚙️ Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🟢 Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📥 Install Dependencies
        run: npm ci

      - name: ✅ Run Home Connector Tests
        env:
          NODE_OPTIONS: --disable-warning=ExperimentalWarning
        run: npm test

      - name: ✅ Smoke-test Home Connector on Node
        shell: bash
        env:
          PORT: 4041
          KODY_USERNAME: ci-user
          HOME_CONNECTOR_SHARED_SECRET: ci-home-connector-secret
          NODE_OPTIONS: --disable-warning=ExperimentalWarning
          WORKER_BASE_URL: http://127.0.0.1:65535
        run: |
          set -euo pipefail

          node server/dev-server.ts \
            > /tmp/home-connector.log 2>&1 &
          pid=$!

          cleanup() {
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --silent --fail "http://127.0.0.1:${PORT}/health"; then
              echo
              exit 0
            fi
            sleep 1
          done

          echo "Home connector failed to become healthy under Node." >&2
          cat /tmp/home-connector.log >&2 || true
          exit 1

  publish:
    runs-on: ubuntu-latest
    name: 🐳 Publish Docker image
    timeout-minutes: 10
    needs: test
    steps:
      - name: ⚙️ Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: 📦 Checkout
        uses: actions/checkout@v6.0.2

      - name: 🧾 Validate Docker Hub configuration
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          HOME_CONNECTOR_DOCKER_IMAGE: ${{ vars.HOME_CONNECTOR_DOCKER_IMAGE }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "Missing GitHub Actions secret DOCKERHUB_USERNAME." >&2
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Missing GitHub Actions secret DOCKERHUB_TOKEN." >&2
            exit 1
          fi

          if [ -z "${HOME_CONNECTOR_DOCKER_IMAGE:-}" ]; then
            echo "Missing GitHub Actions variable HOME_CONNECTOR_DOCKER_IMAGE." >&2
            echo "Expected a Docker Hub image name like <namespace>/kody-home-connector." >&2
            exit 1
          fi

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Compute Docker tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.HOME_CONNECTOR_DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: 🚀 Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          build-args: |
            APP_COMMIT_SHA=${{ github.sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
